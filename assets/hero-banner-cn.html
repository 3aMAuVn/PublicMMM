<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Math Master Banner</title>
  <style>
    :root {
      --banner-width: 2047px;
      --banner-height: 523px;
      --navy-top: #000b35;
      --navy-bottom: #071851;
      --title-orange: #ee8f2c;
      --text-dark: #0c2137;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--banner-width);
      background: #091332;
      font-family: "Trebuchet MS", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "SimHei", "Noto Sans CJK SC", "Source Han Sans SC", Arial, sans-serif;
    }

    .banner {
      position: relative;
      width: var(--banner-width);
      height: var(--banner-height);
      overflow: hidden;
      background:
        radial-gradient(circle at 18% -18%, rgba(37, 82, 193, 0.12), transparent 30%),
        radial-gradient(circle at 82% 0%, rgba(48, 92, 220, 0.10), transparent 25%),
        linear-gradient(180deg, var(--navy-top) 0%, var(--navy-bottom) 100%);
    }

    .sky {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      box-shadow: 0 0 4px rgba(255,255,255,0.12);
      animation-name: twinkle;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      will-change: opacity, filter, transform;
    }

    .gold-sparkle {
      animation-name: twinkleGold;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      transform-origin: center;
      will-change: opacity, transform;

      position: absolute;
      line-height: 1;
      color: #ffd35d;
      opacity: 0.92;
      text-shadow:
        0 0 6px rgba(255, 211, 93, 0.24),
        0 0 12px rgba(255, 211, 93, 0.15);
    }

    .left-logo {
      position: absolute;
      left: 36px;
      top: 70px;
      width: 350px;
      height: 350px;
      object-fit: contain;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,0.18));
    }

    .hat-logo {
      position: absolute;
      right: 28px;
      top: 28px;
      width: 114px;
      height: 114px;
      object-fit: contain;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.16));
    }

    .title {
      position: absolute;
      left: 445px;
      top: 30px;
      margin: 0;
      font-size: 118px;
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: 0.5px;
      color: var(--title-orange);
      font-family: "Arial Black", "Trebuchet MS", Arial, sans-serif;
      text-shadow:
        0 5px 0 rgba(0,0,0,0.38),
        0 11px 18px rgba(0,0,0,0.22);
    }

    .subtitles {
      position: absolute;
      left: 445px;
      top: 140px;
      display: flex;
      align-items: center;
      gap: 11px;
      font-size: 35px;
      font-weight: 900;
      white-space: nowrap;
      font-family: "Arial Black", "Trebuchet MS", Arial, sans-serif;
      text-shadow:
        -2px 0 #000, 2px 0 #000, 0 -2px #000, 0 2px #000,
        -2px -2px #000, 2px -2px #000, -2px 2px #000, 2px 2px #000;
    }

    .subtitle-1 { color: #ffad62; }
    .subtitle-2 { color: #68d6ff; }
    .subtitle-3 { color: #b6a6ff; }
    .sub-dot {
      color: #fff;
      font-size: 27px;
      transform: translateY(-1px);
    }

    .pill {
      position: absolute;
      display: flex;
      align-items: center;
      height: 74px;
      border: 3px solid #ffffff;
      border-radius: 28px;
      padding: 0 18px 0 14px;
      color: var(--text-dark);
      box-shadow: 0 6px 12px rgba(0,0,0,0.10);
    }

    .pill .icon {
      width: 54px;
      height: 54px;
      min-width: 54px;
      margin-right: 16px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.96);
      color: #fff;
      font-size: 29px;
      font-weight: 900;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.10);
    }

    .pill .text {
      font-size: 28px;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill1 { left: 440px; top: 196px; width: 422px; background: #86c9e9; }
    .pill1 .icon { background: #4aa1de; }

    .pill2 { left: 878px; top: 196px; width: 389px; background: #97cf8f; }
    .pill2 .icon { background: #a478f5; }

    .pill3 { left: 1285px; top: 196px; width: 721px; background: #efc676; }
    .pill3 .icon { background: #4dc1b1; }

    .pill4 { left: 440px; top: 285px; width: 753px; background: #b6a6ea; }
    .pill4 .icon { background: #f0a24c; }

    .pill5 { left: 1210px; top: 285px; width: 796px; background: #f5b2bc; }
    .pill5 .icon { background: #f56d97; }

    .pill6 { left: 440px; top: 375px; width: 718px; background: #76bfdc; }
    .pill6 .icon { background: #58b8de; }

    .pill7 { left: 1210px; top: 375px; width: 796px; background: #93cc8d; }
    .pill7 .icon { background: #ef5a6c; }

    .pill3 .text,
    .pill4 .text,
    .pill5 .text,
    .pill7 .text {
      font-size: 27px;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.18;
        filter: brightness(0.9);
      }
      25% {
        opacity: 0.95;
        filter: brightness(1.2);
      }
      50% {
        opacity: 0.45;
        filter: brightness(1);
      }
      75% {
        opacity: 1;
        filter: brightness(1.35);
      }
    }

    @keyframes twinkleGold {
      0%, 100% {
        opacity: 0.25;
        transform: scale(0.78) rotate(0deg);
      }
      50% {
        opacity: 1;
        transform: scale(1.14) rotate(8deg);
      }
    }
    /* === Responsive scaling for iframe embedding === */
    html {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      overflow: hidden !important;
      background: #071851 !important;
    }
    body {
      margin: 0 !important;
      padding: 0 !important;
      width: 2047px !important;
      height: 523px !important;
      overflow: hidden !important;
      background: #071851 !important;
      transform-origin: 0 0 !important;
      /* JS sets transform: scale(...) on resize */
    }
    .banner {
      width: 2047px !important;
      height: 523px !important;
    }
</style>
</head>

  (function () {
    function rescale() {
      var w = document.documentElement.clientWidth || window.innerWidth;
      if (!w) return;
      var scale = w / 2047;
      if (document.body) {
        document.body.style.transform = 'scale(' + scale + ')';

      // Also adjust html height so the iframe doesn't get cropped vertically
      document.documentElement.style.height = Math.round(523 * scale) + 'px';
    }
    function init() {
      rescale();
      window.addEventListener('resize', rescale);
      if (window.ResizeObserver) {
        try { new ResizeObserver(rescale).observe(document.documentElement); } catch(e) {}
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
